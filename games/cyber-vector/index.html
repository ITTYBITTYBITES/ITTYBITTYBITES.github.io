<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Cyber Vector Grid Hover-Racer — Elite Commercial Web Asset</title>
    <meta name="description" content="High-octane WebGL wireframe hovercraft execution test. Navigate a hyper-speed neon vector grid, overriding spatial execution drift under extreme velocity.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6P6NPFW4FZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6P6NPFW4FZ');
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Orbitron:wght@700;900&display=swap');
        body, html { overscroll-behavior: none; touch-action: none; -webkit-touch-callout: none; }
        body { font-family: 'JetBrains+Mono', monospace; background-color: #090d16; color: #f8fafc; margin: 0; padding: 16px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; overscroll-behavior-y: contain; }
        #game-sandbox-area { width: 100%; max-width: 900px; mx-auto; flex: 1; display: flex; flex-direction: column; justify-content: center; items-center: center; overflow: hidden; border: 2px solid #22d3ee; border-radius: 16px; box-shadow: 0 0 40px rgba(34,211,238,0.15); }
    </style>
    <!-- Universal Automated Cache-Busting & Auto-Refresh Guard -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script>
        (function() {
            const clientVer = localStorage.getItem('arcade_client_deployment_ver');
            const liveVer = 'v=1781821243';
            if (clientVer !== liveVer) {
                localStorage.setItem('arcade_client_deployment_ver', liveVer);
                if (window.caches) { caches.keys().then(n => n.forEach(c => caches.delete(c))); }
                if (clientVer) { window.location.reload(true); }
            }
        })();
    </script>
</head>
<body class="selection:bg-cyan-500 selection:text-slate-900 antialiased">
    
    <div id="game-sandbox-area">
    </div>

    <script>
        const canvas = document.createElement('canvas');
        const logicalWidth = 800; const logicalHeight = 500;
        canvas.width = logicalWidth; canvas.height = logicalHeight;
        canvas.className = 'w-full block bg-black cursor-pointer';
        canvas.style.aspectRatio = '16 / 10';
        canvas.style.objectFit = 'cover';
        document.getElementById('game-sandbox-area').appendChild(canvas);

        const ctx = canvas.getContext('2d');
        // DevicePixelRatio Retina Scaling Correction
        const dpr = window.devicePixelRatio || 1;
        canvas.width = logicalWidth * dpr;
        canvas.height = logicalHeight * dpr;
        ctx.scale(dpr, dpr);
        let speed = 6, score = 0, horizonY = 180;
        let lines = [], blocks = [];
        let px = logicalWidth/2;

        canvas.style.touchAction='none';
        const updatePos = (e) => {
            const rect = canvas.getBoundingClientRect();
            if(rect.width > 0) {
                const clientX = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
                if(clientX > 0) {
                    px = (clientX - rect.left)*(logicalWidth/rect.width);
                }
            }
        };
        window.addEventListener('pointermove', updatePos);
        canvas.addEventListener('pointerdown', (e) => {
            try { e.target.setPointerCapture(e.pointerId); } catch(err){}
            updatePos(e);
        });

        for(let i=0; i<15; i++) blocks.push({ x: 100+Math.random()*(logicalWidth-200), z: 500+i*250 });

        function loop() {
            ctx.fillStyle = '#030712'; ctx.fillRect(0,0, logicalWidth, logicalHeight);

            // Draw Cyber Cyber Matrix Grid
            ctx.strokeStyle = 'rgba(34,211,238,0.3)'; ctx.lineWidth = 1.5;
            for(let x=-1000; x<2000; x+=120) {
                ctx.beginPath(); ctx.moveTo(logicalWidth/2, horizonY); ctx.lineTo(x, logicalHeight); ctx.stroke();
            }

            horizonY = 180 + Math.sin(score*0.02)*15;
            score += 2;

            // Run blocks
            for(let i=blocks.length-1; i>=0; i--) {
                const b = blocks[i];
                b.z -= speed*2;

                if(b.z < 80 && b.z > 20) {
                    if(Math.abs(px - (logicalWidth/2 + (b.x - logicalWidth/2)*(500/b.z))) < 40) {
                        score = Math.max(0, score - 100); b.z = 2000;
                        if(window.parent) window.parent.postMessage({ type: "ARCADE_TRIGGER_AD", adType: "interstitial" }, "*");
                    }
                }

                if(b.z <= 10) { b.z = 2500; b.x = 100+Math.random()*(logicalWidth-200); }

                const scale = 400 / Math.max(1, b.z);
                const screenX = logicalWidth/2 + (b.x - logicalWidth/2)*scale;
                const screenY = horizonY + 120*scale;

                ctx.fillStyle = '#f43f5e'; ctx.fillRect(screenX-20*scale, screenY-30*scale, 40*scale, 40*scale);
                ctx.strokeStyle = '#fecdd3'; ctx.strokeRect(screenX-20*scale, screenY-30*scale, 40*scale, 40*scale);
            }

            // Player Craft
            ctx.fillStyle = '#34d399'; ctx.beginPath(); ctx.moveTo(px, logicalHeight-20); ctx.lineTo(px-25, logicalHeight); ctx.lineTo(px+25, logicalHeight); ctx.fill();

            // HUD
            ctx.fillStyle = '#facc15'; ctx.font = 'bold 16px monospace';
            ctx.fillText(`VECTOR VELOCITY: ${speed}x // ODOMETER: ${score}`, 20, 30);
            ctx.fillText(`◈ SLIDE MOUSE LEFT/RIGHT TO DEFLECT VECTOR CRAFT ◈`, 20, logicalHeight - 30);

            requestAnimationFrame(loop);
        }
        loop();
    </script>

</body>
</html>
