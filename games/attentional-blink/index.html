<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ATTENTIONAL BLINK ASSESSOR — The 2-Second Witness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6P6NPFW4FZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6P6NPFW4FZ');
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Orbitron:wght@700;900&display=swap');
        body, html { overscroll-behavior: none; touch-action: none; -webkit-touch-callout: none; }
        body { font-family: 'JetBrains+Mono', monospace; background-color: #090d16; color: #f8fafc; margin: 0; padding: 24px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
    </style>
</head>
<body class="selection:bg-cyan-500 selection:text-slate-900 antialiased">
    <div id="game-sandbox-area" class="w-full max-w-4xl mx-auto flex-1 flex flex-col justify-center">
    </div>
    <script>
        
        const container = document.getElementById('game-sandbox-area');
        container.innerHTML = `
            <div class="text-center w-full max-w-xs mx-auto">
                <div id="rsvp-char" class="text-7xl font-bold font-mono tracking-tight text-white mb-8 h-20 flex items-center justify-center bg-slate-900/80 border border-slate-800 rounded-2xl shadow-inner">READY</div>
                <button id="rsvp-start" class="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-black text-sm uppercase py-4 px-6 tracking-widest rounded-xl transition-all shadow-lg shadow-cyan-500/20 active:scale-95">Engage Capture Stream</button>
                <div id="rsvp-input-zone" class="hidden mt-6 space-y-4 font-mono">
                    <p class="text-xs text-slate-400">Input the two numeric targets identified in exact chronological order:</p>
                    <input type="text" id="rsvp-ans" class="bg-slate-950 border-2 border-slate-700 rounded-xl p-3 text-center text-2xl text-cyan-400 font-bold w-full tracking-widest focus:outline-none focus:border-cyan-400 uppercase font-mono shadow-inner" maxlength="2">
                    <button id="rsvp-submit" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-extrabold text-xs uppercase py-3.5 px-6 rounded-xl transition-all shadow-lg shadow-emerald-500/20 active:scale-95">Verify Operative Target</button>
                </div>
            </div>
        `;

        const charBox = document.getElementById('rsvp-char');
        const startBtn = document.getElementById('rsvp-start');
        const inputZone = document.getElementById('rsvp-input-zone');
        const ansInput = document.getElementById('rsvp-ans');
        const submitBtn = document.getElementById('rsvp-submit');
        let targets = [];
        let intervalId = null;

        startBtn.style.touchAction='none'; startBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); try{ e.target.setPointerCapture(e.pointerId); }catch(err){}
            startBtn.classList.add('hidden');
            inputZone.classList.add('hidden');
            ansInput.value = '';
            targets = [];
            
            const sequence = [];
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const nums = "23456789";
            
            for(let i=0; i<20; i++) sequence.push(chars[Math.floor(Math.random()*chars.length)]);
            
            const idx1 = 5 + Math.floor(Math.random()*3);
            const idx2 = idx1 + 2 + Math.floor(Math.random()*4);
            
            targets.push(nums[Math.floor(Math.random()*nums.length)]);
            targets.push(nums[Math.floor(Math.random()*nums.length)]);
            sequence[idx1] = targets[0];
            sequence[idx2] = targets[1];
            
            let frame = 0;
            intervalId = setInterval(() => {
                if (frame < sequence.length) {
                    charBox.textContent = sequence[frame];
                    frame++;
                } else {
                    clearInterval(intervalId);
                    charBox.textContent = "?";
                    inputZone.classList.remove('hidden');
                    ansInput.focus();
                }
            }, 100);
        });

        submitBtn.style.touchAction='none'; submitBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); try{ e.target.setPointerCapture(e.pointerId); }catch(err){}
            const guess = ansInput.value.trim();
            const actual = targets.join('');
            if (guess === actual) {
                charBox.textContent = "SUCCESS";
                charBox.className = "text-5xl font-black font-mono tracking-tight text-emerald-400 mb-8 h-20 flex items-center justify-center bg-slate-900 border-2 border-emerald-500/50 rounded-2xl shadow-lg";
                if(window.parent) window.parent.postMessage({ type: "ARCADE_TRIGGER_AD", adType: "rewarded" }, "*");
            } else {
                charBox.textContent = `FAIL [${actual}]`;
                charBox.className = "text-4xl font-black font-mono tracking-tight text-rose-500 mb-8 h-20 flex items-center justify-center bg-slate-900 border-2 border-rose-500/50 rounded-2xl shadow-lg";
            }
            startBtn.classList.remove('hidden');
            startBtn.textContent = "Restart Operative Stream";
            inputZone.classList.add('hidden');
        });
        
    </script>
</body>
</html>
