<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Cyber Pong 1v1 — Elite Commercial Web Asset</title>
    <meta name="description" content="High-speed table tennis deflector against an incredibly strategic dual-process AI opponent. Test your peripheral paddle deflection reactions.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6P6NPFW4FZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6P6NPFW4FZ');
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Orbitron:wght@700;900&display=swap');
        body, html { overscroll-behavior: none; touch-action: none; -webkit-touch-callout: none; }
        body { font-family: 'JetBrains+Mono', monospace; background-color: #090d16; color: #f8fafc; margin: 0; padding: 16px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; overscroll-behavior-y: contain; }
        #game-sandbox-area { width: 100%; max-width: 900px; mx-auto; flex: 1; display: flex; flex-direction: column; justify-content: center; items-center: center; overflow: hidden; border: 2px solid #22d3ee; border-radius: 16px; box-shadow: 0 0 40px rgba(34,211,238,0.15); }
    </style>
    <!-- Universal Automated Cache-Busting & Auto-Refresh Guard -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script>
        (function() {
            const clientVer = localStorage.getItem('arcade_client_deployment_ver');
            const liveVer = 'v=1781821243';
            if (clientVer !== liveVer) {
                localStorage.setItem('arcade_client_deployment_ver', liveVer);
                if (window.caches) { caches.keys().then(n => n.forEach(c => caches.delete(c))); }
                if (clientVer) { window.location.reload(true); }
            }
        })();
    </script>
</head>
<body class="selection:bg-cyan-500 selection:text-slate-900 antialiased">
    
    <div id="game-sandbox-area">
    </div>

    <script>
        const canvas = document.createElement('canvas');
        const logicalWidth = 800; const logicalHeight = 500;
        canvas.width = logicalWidth; canvas.height = logicalHeight;
        canvas.className = 'w-full block bg-black cursor-none';
        canvas.style.aspectRatio = '16 / 10';
        canvas.style.objectFit = 'cover';
        document.getElementById('game-sandbox-area').appendChild(canvas);

        const ctx = canvas.getContext('2d');
        // DevicePixelRatio Retina Scaling Correction
        const dpr = window.devicePixelRatio || 1;
        canvas.width = logicalWidth * dpr;
        canvas.height = logicalHeight * dpr;
        ctx.scale(dpr, dpr);
        const p1 = { x: 30, y: 200, w: 14, h: 90 };
        const ai = { x: 756, y: 200, w: 14, h: 90 };
        const ball = { x: logicalWidth/2, y: logicalHeight/2, vx: 7, vy: 5, r: 10 };
        let score1 = 0, scoreAi = 0;

        canvas.style.touchAction='none';
        const updatePaddle = (e) => {
            const rect = canvas.getBoundingClientRect();
            if(rect.height > 0) {
                const clientY = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
                if(clientY > 0) {
                    p1.y = (clientY - rect.top)*(logicalHeight/rect.height) - p1.h/2;
                    p1.y = Math.max(0, Math.min(logicalHeight - p1.h, p1.y));
                }
            }
        };
        window.addEventListener('pointermove', updatePaddle);
        canvas.addEventListener('pointerdown', (e) => {
            try { e.target.setPointerCapture(e.pointerId); } catch(err){}
            updatePaddle(e);
        });

        function loop() {
            ctx.fillStyle = '#030712'; ctx.fillRect(0,0, logicalWidth, logicalHeight);

            ball.x += ball.vx; ball.y += ball.vy;
            if(ball.y<=ball.r || ball.y>=logicalHeight-ball.r) ball.vy *= -1;

            // AI
            ai.y += (ball.y - (ai.y + ai.h/2))*0.15;
            ai.y = Math.max(0, Math.min(logicalHeight - ai.h, ai.y));

            // Impacts
            if(ball.x - ball.r <= p1.x+p1.w && ball.y >= p1.y && ball.y <= p1.y+p1.h) { ball.vx = Math.abs(ball.vx) * 1.05; }
            if(ball.x + ball.r >= ai.x && ball.y >= ai.y && ball.y <= ai.y+ai.h) { ball.vx = -Math.abs(ball.vx); }

            if(ball.x < 0) { scoreAi++; ball.x=logicalWidth/2; ball.y=logicalHeight/2; ball.vx=7; }
            if(ball.x > logicalWidth) { score1++; ball.x=logicalWidth/2; ball.y=logicalHeight/2; ball.vx=-7; }

            ctx.fillStyle = '#22d3ee'; ctx.fillRect(p1.x, p1.y, p1.w, p1.h);
            ctx.fillStyle = '#f43f5e'; ctx.fillRect(ai.x, ai.y, ai.w, ai.h);
            ctx.fillStyle = '#facc15'; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();

            ctx.font = 'bold 24px monospace'; ctx.fillText(`${score1}  //  ${scoreAi}`, logicalWidth/2 - 50, 40);
            requestAnimationFrame(loop);
        } loop();
    </script>

</body>
</html>
