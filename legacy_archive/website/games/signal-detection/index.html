<script defer="True" src="../../assets/arcade-monetization.js"></script><script type="module" src="../../assets/kernel-chamber.js?v=1.1.0"></script><link rel="stylesheet" href="../../assets/shared-nav.css"><script src="../../assets/global-nav.js"></script></head>
<body class="selection:bg-cyan-500 selection:text-slate-900 antialiased" data-gear-id="games" data-kernel-event="library.game_opened">
<div class="w-full max-w-4xl mx-auto flex-1 flex flex-col justify-center" id="game-sandbox-area">
</div>
<script>
        
        const container = document.getElementById('game-sandbox-area');
        const canvas = document.createElement('canvas');
        canvas.width = 600; canvas.height = 400;
        canvas.className = "border-2 border-slate-800 rounded-2xl bg-slate-950 w-full max-w-2xl mx-auto cursor-pointer shadow-2xl block";
        container.appendChild(canvas);

        const scoreEl = document.createElement('div');
        scoreEl.className = "mt-6 text-center font-mono font-bold text-sm tracking-widest text-emerald-400 uppercase";
        scoreEl.textContent = "FILTER XP: 0";
        container.appendChild(scoreEl);

        const ctx = canvas.getContext('2d');
        const noiseCount = 300; const sigCount = 45;
        let nParts = []; let sParts = [];
        let active = false; let cool = 0; let xp = 0;

        for(let i=0; i<noiseCount; i++) nParts.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5 });
        for(let i=0; i<sigCount; i++) sParts.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: 3.2, vy: 0 });

        function update() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            cool++;

            if(!active && cool > 160 && Math.random() < 0.028) { active = true; cool = 0; }
            if(active && cool > 100) { active = false; cool = 0; }

            ctx.fillStyle = "rgba(100,116,139,0.45)";
            nParts.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0) p.x = canvas.width; if(p.x > canvas.width) p.x = 0;
                if(p.y < 0) p.y = canvas.height; if(p.y > canvas.height) p.y = 0;
                ctx.fillRect(p.x, p.y, 3, 3);
            });

            if(active) {
                ctx.fillStyle = "rgba(45,212,191,0.7)";
                sParts.forEach(p => {
                    p.x += p.vx;
                    if(p.x > canvas.width) p.x = 0;
                    ctx.fillRect(p.x, p.y, 3, 3);
                });
            }

            ctx.fillStyle = "rgba(15,23,42,0.9)";
            ctx.fillRect(0, canvas.height - 36, canvas.width, 36);
            ctx.fillStyle = "#34d399"; ctx.font = "bold 11px monospace";
            ctx.fillText("◈ TAP SCREEN INSTANTLY WHEN COHERENT RIGHTWARD FLOW DETECTED", 20, canvas.height - 14);

            requestAnimationFrame(update);
        }

        canvas.style.touchAction='none';
        canvas.addEventListener('pointerdown', (e) => {
            try { e.target.setPointerCapture(e.pointerId); } catch(err){}
            e.preventDefault();
            if(active) {
                xp += 120; active = false; cool = -50;
                if(window.parent && xp % 360 === 0) window.parent.postMessage({ type: "ARCADE_TRIGGER_AD", adType: "interstitial" }, "*");
            } else {
                xp = Math.max(0, xp - 60);
            }
            scoreEl.textContent = `FILTER XP: ${xp}`;
        });

        update();
        
    </script>
