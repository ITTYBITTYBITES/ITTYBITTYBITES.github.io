<script defer="True" src="../../assets/arcade-monetization.js"></script><script type="module" src="../../assets/kernel-chamber.js?v=1.1.0"></script><link rel="stylesheet" href="../../assets/shared-nav.css"><script src="../../assets/global-nav.js"></script></head>
<body class="selection:bg-cyan-500 selection:text-slate-900 antialiased" data-gear-id="games" data-kernel-event="library.game_opened">
<div id="game-sandbox-area">
</div>
<script>
        const canvas = document.createElement('canvas');
        const logicalWidth = 800; const logicalHeight = 500;
        canvas.width = logicalWidth; canvas.height = logicalHeight;
        canvas.className = 'w-full block bg-black cursor-none';
        canvas.style.aspectRatio = '16 / 10';
        canvas.style.objectFit = 'cover';
        document.getElementById('game-sandbox-area').appendChild(canvas);

        const ctx = canvas.getContext('2d');
        // DevicePixelRatio Retina Scaling Correction
        const dpr = window.devicePixelRatio || 1;
        canvas.width = logicalWidth * dpr;
        canvas.height = logicalHeight * dpr;
        ctx.scale(dpr, dpr);
        const paddle = { x: logicalWidth/2, y: logicalHeight - 30, w: 110, h: 14 };
        let balls = [{ x: logicalWidth/2, y: logicalHeight/2, vx: 5, vy: -5, r: 8 }];
        let bricks = []; let score = 0;
        let lastAdScore = 0;
        function triggerArcadeAd(type='interstitial') {
            if (window.parent) window.parent.postMessage({ type: "ARCADE_TRIGGER_AD", adType: type }, "*");
        }
        function maybeScoreBreak(type='interstitial') {
            const milestone = Math.floor(score / 250);
            if (milestone > 0 && milestone !== lastAdScore) {
                lastAdScore = milestone;
                triggerArcadeAd(type);
            }
        }

        canvas.style.touchAction='none';
        const updatePaddle = (e) => {
            const rect = canvas.getBoundingClientRect();
            if(rect.width > 0) {
                const clientX = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
                if(clientX > 0) {
                    paddle.x = (clientX - rect.left)*(logicalWidth/rect.width);
                    paddle.x = Math.max(paddle.w/2, Math.min(logicalWidth - paddle.w/2, paddle.x));
                }
            }
        };
        window.addEventListener('pointermove', updatePaddle);
        canvas.addEventListener('pointerdown', (e) => {
            try { e.target.setPointerCapture(e.pointerId); } catch(err){}
            updatePaddle(e);
        });

        function genB() {
            bricks = [];
            for(let r=0; r<5; r++) {
                for(let c=0; c<10; c++) bricks.push({ x: 55+c*70, y: 50+r*26, w:64, h:18, c: r%2===0?'#22d3ee':'#facc15' });
            }
        } genB();

        function loop() {
            ctx.fillStyle = '#030712'; ctx.fillRect(0,0, logicalWidth, logicalHeight);

            balls.forEach(b => {
                b.x += b.vx; b.y += b.vy;
                if(b.x<=b.r || b.x>=logicalWidth-b.r) b.vx *= -1;
                if(b.y<=b.r) b.vy *= -1;
                if(b.y >= logicalHeight) {
                    maybeScoreBreak('interstitial');
                    b.x = logicalWidth/2; b.y = logicalHeight/2; b.vy = -5;
                }
                
                if(b.y + b.r >= paddle.y && b.x >= paddle.x-paddle.w/2 && b.x <= paddle.x+paddle.w/2) {
                    b.vy = -Math.abs(b.vy); b.vx += (b.x - paddle.x)*0.08;
                }

                bricks.forEach((br, idx) => {
                    if(b.x>=br.x && b.x<=br.x+br.w && b.y>=br.y && b.y<=br.y+br.h) {
                        bricks.splice(idx,1); b.vy *= -1; score += 25;
                        if(bricks.length===0) { triggerArcadeAd('rewarded'); genB(); }
                    }
                });
                ctx.fillStyle = '#white'; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
            });

            ctx.fillStyle = '#34d399'; ctx.fillRect(paddle.x-paddle.w/2, paddle.y, paddle.w, paddle.h);

            ctx.fillStyle = '#22d3ee'; ctx.font = 'bold 16px monospace';
            ctx.fillText(`NEON BRICKS XP: ${score} // TARGETS LEFT: ${bricks.length}`, 20, 30);
            requestAnimationFrame(loop);
        } loop();
    </script>
