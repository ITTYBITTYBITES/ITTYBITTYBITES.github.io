name: CI Build & Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify dist artifacts
        run: |
          ls -la dist/
          test -f dist/index.html || exit 1
          test -f dist/404.html || exit 1
          test -f dist/manifest.webmanifest || exit 1
          echo "✓ Build artifacts verified"

      - name: Upload build artifact (for PR review)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7
