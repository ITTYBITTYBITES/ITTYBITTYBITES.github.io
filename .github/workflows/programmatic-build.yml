name: Automated Programmatic SEO Engine Build

on:
  schedule:
    - cron: '37 4 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'core-data/**'
      - 'pipeline-data/**'
      - 'templates/**'
      - 'build-engine.js'
      - 'package.json'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # Download files as a zip directly from GitHub — bypasses git entirely, no submodule errors
      - name: Download repository as zip
        run: |
          curl -L -o repo.zip "https://github.com/ITTYBITTYBITES/ITTYBITTYBITES.github.io/archive/refs/heads/main.zip"
          unzip -q repo.zip
          mv ITTYBITTYBITES.github.io-main/* .
          mv ITTYBITTYBITES.github.io-main/.* . 2>/dev/null || true
          rm -rf ITTYBITTYBITES.github.io-main repo.zip
          # Remove any .git folder to prevent submodule processing
          rm -rf .git

      - name: Initialize git in downloaded files
        run: |
          git init
          git remote add origin https://github.com/ITTYBITTYBITES/ITTYBITTYBITES.github.io.git

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Application Dependencies
        run: |
          npm ci

      - name: Execute Programmatic Site Compilation Engine
        run: node build-engine.js
        env:
          NODE_ENV: production

      - name: Configure Git Identity
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Automatically Commit and Push Generated Static Assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated programmatic index expansion [skip ci]"
          branch: main
          file_pattern: |
            library/*.html
            intel/*.html
            sitemap.xml
            library.html
          skip_dirty: false
          commit_options: '--no-verify'
