name: Automated Programmatic SEO Engine Build

on:
  schedule:
    - cron: '37 4 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'core-data/**'
      - 'pipeline-data/**'
      - 'templates/**'
      - 'build-engine.js'
      - 'package.json'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download repository as zip
        run: |
          curl -L -o repo.zip "https://github.com/ITTYBITTYBITES/ITTYBITTYBITES.github.io/archive/refs/heads/main.zip"
          unzip -q repo.zip
          mv ITTYBITTYBITES.github.io-main/* .
          mv ITTYBITTYBITES.github.io-main/.* . 2>/dev/null || true
          rm -rf ITTYBITTYBITES.github.io-main repo.zip

      - name: Initialize git
        run: |
          git init
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git remote add origin https://github.com/ITTYBITTYBITES/ITTYBITTYBITES.github.io.git

      - name: Fetch main branch
        run: |
          git fetch origin main
          git reset --soft origin/main

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Application Dependencies
        run: |
          npm ci

      - name: Execute Programmatic Site Compilation Engine
        run: node build-engine.js
        env:
          NODE_ENV: production

      - name: Commit and push generated files
        run: |
          git add --all
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Automated programmatic index expansion [skip ci]"
          git push origin main --force

      - name: Notify completion
        run: echo "Build complete - site updated"
