name: Automated Programmatic SEO Engine Build

on:
  schedule:
    - cron: '37 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Application Dependencies
        run: npm ci

      - name: Execute Programmatic Site Compilation Engine
        run: node website/build-engine.js
        env:
          NODE_ENV: production

      - name: Commit and Push Generated Files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add --all
          git reset node_modules/ 2>/dev/null || true
          git reset .npm/ 2>/dev/null || true
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Automated programmatic index expansion [skip ci]"
          git push origin main

      - name: Notify Completion
        run: echo "Build complete — site updated successfully"
