<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ittybittybites Hub</title>
  <link rel="stylesheet" href="styles.css">
  
  <!-- Three.js CDN Dependency -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  
  <!-- Three.js CSS3D Renderer Dependency -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS3DRenderer.js"></script>
  
  <!-- Three.js Post-Processing Shader Dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
  
  <!-- Tween.js CDN Dependency -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
  
  <!-- Platform Engine Scripts -->
  <script defer src="scripts/telemetry.js"></script>
  <script defer src="scripts/audio_manager.js"></script>
  <script defer src="scripts/ad_manager.js"></script>
  <script defer src="scripts/spatial_controller.js"></script>
  <script defer src="scripts/engine.js"></script>
</head>
<body>
  <div id="hub-shell">
    <!-- Header: Navigation and Telemetry scoreboard -->
    <header id="hub-header">
      <div class="logo-area" style="cursor: pointer;" onclick="if(window.ibbEngine) window.ibbEngine.showPortal();">
        <span class="hub-icon">❖</span>
        <div class="logo-title">
          <h1>ittybittybites</h1>
          <span class="hub-tagline">Holographic Operational Hub</span>
        </div>
      </div>
      <div id="hub-telemetry-panel">
        <div class="telemetry-item">
          <span class="label">SESSIONS</span>
          <span id="tel-sessions" class="value">0</span>
        </div>
        <div class="telemetry-item">
          <span class="label">PLAYTIME</span>
          <span id="tel-playtime" class="value">0s</span>
        </div>
      </div>
    </header>

    <!-- App Body containing Sidebar Navigation and Central Viewport -->
    <div id="hub-body">
      <aside id="hub-sidebar">
        <h2>Game Registry Directory</h2>
        <div id="hub-nav-links">
          <!-- Dynamic category groups and game buttons are injected here by the engine -->
        </div>
      </aside>

      <main id="hub-main">
        <div id="hub-viewport">
          <!-- Viewport layers will be injected dynamically by engine.js -->
          <div class="loading-spinner">Initializing Engine Platform...</div>
        </div>
      </main>
    </div>
  </div>

  <script>
    // Listen to the custom event emitted by TelemetryManager to update telemetry scores on-screen
    window.addEventListener('ibb-telemetry-sync', (event) => {
      const stats = event.detail;
      if (!stats) return;
      
      const sessionEl = document.getElementById('tel-sessions');
      const playtimeEl = document.getElementById('tel-playtime');

      if (sessionEl) sessionEl.textContent = stats.sessionsCount || 1;
      
      if (playtimeEl) {
        const totalSec = stats.totalPlaytimeSeconds || 0;
        if (totalSec >= 60) {
          const min = Math.floor(totalSec / 60);
          const sec = totalSec % 60;
          playtimeEl.textContent = `${min}m ${sec}s`;
        } else {
          playtimeEl.textContent = `${totalSec}s`;
        }
      }
    });

    // Unlocking Web Audio Context on first mouse / click gesture
    const unlockAudio = () => {
      if (window.ibbAudio) {
        window.ibbAudio.resumeContext();
        window.ibbAudio.startAmbience();
      }
      window.removeEventListener('click', unlockAudio);
      window.removeEventListener('keydown', unlockAudio);
    };
    window.addEventListener('click', unlockAudio);
    window.addEventListener('keydown', unlockAudio);

    // Initial setup fallback check
    window.addEventListener('load', () => {
      setTimeout(() => {
        const stats = window.ibbEngine && window.ibbEngine.telemetry ? window.ibbEngine.telemetry.stats : null;
        if (stats) {
          window.dispatchEvent(new CustomEvent('ibb-telemetry-sync', { detail: stats }));
        }
      }, 500);
    });
  </script>
</body>
</html>
