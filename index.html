<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=./website/index.html">
  <link rel="canonical" href="https://ittybittybites.github.io/website/index.html">
  <title>Liquid Memory | Holographic Data-Hub</title>
  <meta name="description" content="Liquid Memory is a Holographic Data-Hub for browser games, arcade experiments, creative prototypes, and the flagship 2 Second Witness cognitive training game.">
  <meta name="theme-color" content="#000000">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { width: 100%; min-height: 100%; margin: 0; }
    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 46%, rgba(0, 240, 255, .12), transparent 34rem),
        linear-gradient(rgba(0, 240, 255, .045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 240, 255, .035) 1px, transparent 1px),
        #000000;
      background-size: auto, 42px 42px, 42px 42px, auto;
      color: #a8ffff;
      font-family: "Courier New", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(0deg, rgba(255,255,255,.026), rgba(255,255,255,.026) 1px, transparent 1px, transparent 4px);
      mix-blend-mode: screen;
      opacity: .42;
    }
    .entry-shell {
      position: relative;
      display: grid;
      place-items: center;
      gap: 14px;
      text-align: center;
      letter-spacing: .18em;
      text-transform: uppercase;
      opacity: .92;
    }
    .entry-orb {
      width: 54px;
      height: 54px;
      border-radius: 999px;
      border: 2px solid rgba(0, 240, 255, .76);
      border-top-color: rgba(255, 0, 255, .74);
      box-shadow: 0 0 22px rgba(0, 240, 255, .46), inset 0 0 22px rgba(0, 240, 255, .24);
      animation: spin 1.15s linear infinite;
    }
    .entry-label {
      color: #00f0ff;
      font-size: clamp(11px, 2.4vw, 13px);
      font-weight: 800;
      text-shadow: 0 0 14px rgba(0, 240, 255, .72);
    }
    .entry-link {
      color: rgba(168, 255, 255, .72);
      font-size: 10px;
      text-decoration: none;
      letter-spacing: .14em;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .entry-orb { animation: none; } }
  </style>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6P6NPFW4FZ"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-6P6NPFW4FZ');</script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1566091161594729" crossorigin="anonymous"></script>
</head>
<body>
  <main class="entry-shell" aria-label="Liquid Memory Holographic Data-Hub redirect">
    <div class="entry-orb" aria-hidden="true"></div>
    <div class="entry-label">Liquid Memory Data-Hub</div>
    <a class="entry-link" href="./website/index.html">Enter Holographic Hub</a>
  </main>
</body>
</html>
