    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "ITTYBITTYBITES",
        "url": "https://ittybittybites.github.io/",
        "description": "Interactive collections worth returning to. Explore meaningful experiences across science, nature, history, and more.",
        "publisher": {

          "name": "ITTYBITTYBITES",
          "logo": "https://ittybittybites.github.io/icons/icon-512.png"
        }
      }
    </script>

    <script>
      /**
       * Bulletproof Self-Healing Recovery Script
       * Detects critical asset failures (e.g. ChunkLoadError) and force-clears
       * the Service Worker to recover from white screens caused by stale caches.
       */
      window.addEventListener('error', function(e) {
        const isChunkError = e.message && (
          e.message.includes('ChunkLoadError') || 
          e.message.includes('Loading chunk') || 
          e.message.includes('Failed to fetch dynamically imported module')
        );
        if (isChunkError) {
          console.warn('ITTYBITTYBITES: Asset mismatch detected. Self-healing...');
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
              return Promise.all(registrations.map(r => r.unregister()));
            }).then(function() {
              window.location.reload(true);
            });
          } else {
            window.location.reload(true);
          }
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
