<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Liquid Memory | Blueprint // Nav</title>
  <meta name="description" content="Liquid Memory is a fullscreen WebGL memory engine: a tactile Blueprint Nav gear interface operating a persistent 3D spatial ecosystem.">
  <meta name="author" content="Liquid Memory">
  <link rel="canonical" href="https://ittybittybites.github.io/website/index.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Liquid Memory | Blueprint // Nav">
  <meta property="og:description" content="Operate a fullscreen generative memory ecosystem through tactile Blueprint Nav gears.">
  <meta property="og:site_name" content="Liquid Memory">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6P6NPFW4FZ"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-6P6NPFW4FZ');</script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1566091161594729" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="assets/brand-system.css">
  <script type="module" src="assets/kernel-home.js"></script>
</head>
<body class="ibb-brand liquid-fullscreen">
  <main id="living-kernel" class="liquid-memory-system" aria-label="Liquid Memory fullscreen Blueprint Nav engine">
    <div id="spatial-canvas" class="kernel-spatial-canvas liquid-spatial-viewport" data-nodes="0" data-last-event="idle" aria-label="Fullscreen Liquid Memory WebGL biome"></div>

    <section class="liquid-overlay liquid-overlay--brand" aria-label="Liquid Memory identity">
      <a class="liquid-brand-mark" href="index.html" aria-label="Liquid Memory home">
        <span class="liquid-brand-mark__sigil">LM</span>
        <span><strong>Liquid Memory</strong><em>Blueprint // Nav</em></span>
      </a>
      <strong id="spatial-live-region" class="liquid-status-pill">Digital nautiloid standing by</strong>
    </section>

    <section class="liquid-overlay liquid-overlay--state" aria-label="Kernel state telemetry">
      <div class="liquid-state-card">
        <span>Depth</span>
        <strong data-kernel-bind="player.level">1</strong>
      </div>
      <div class="liquid-state-card">
        <span>Signals</span>
        <strong data-kernel-bind="system.eventCount">0</strong>
      </div>
      <div class="liquid-state-card">
        <span>Trace</span>
        <strong data-kernel-bind="player.resources.trace">0</strong>
      </div>
      <div class="liquid-state-card">
        <span>Pearls</span>
        <strong data-kernel-bind="player.resources.pearls">0</strong>
      </div>
    </section>

    <section class="blueprint-gear-rig liquid-overlay" aria-label="Blueprint navigation gears">
      <button class="blueprint-gear blueprint-gear--archive" type="button" data-kernel-gear="archive" data-unlock-level="1" aria-pressed="false"><span>Archive</span></button>
      <button class="blueprint-gear blueprint-gear--games" type="button" data-kernel-gear="games" data-unlock-level="1" aria-pressed="false"><span>Games</span></button>
      <button class="blueprint-gear blueprint-gear--community" type="button" data-kernel-gear="community" data-unlock-level="2" aria-pressed="false"><span>Community</span></button>
      <button class="blueprint-gear blueprint-gear--blueprint" type="button" data-kernel-gear="blueprint" data-unlock-level="1" aria-pressed="false"><span>Blueprint</span></button>
      <button class="blueprint-gear blueprint-gear--memory" type="button" data-kernel-gear="memory" data-unlock-level="3" aria-pressed="false"><span>Memory</span></button>
    </section>

    <button class="kernel-focus-dial liquid-overlay" type="button" onclick="window.LiquidMemoryKernel && window.LiquidMemoryKernel.focusSpatial()" aria-label="Focus next spatial node">Engage dial</button>

    <details class="kernel-dev-view liquid-overlay">
      <summary>Developer view</summary>
      <p><code>window.LiquidMemoryKernel</code> is active. State, gear focus, and spatial memory persist across refresh.</p>
      <button class="ibb-button ibb-button--secondary" type="button" onclick="window.LiquidMemoryKernel && window.LiquidMemoryKernel.clear()">Reset local Kernel state</button>
    </details>
  </main>
</body>
</html>
