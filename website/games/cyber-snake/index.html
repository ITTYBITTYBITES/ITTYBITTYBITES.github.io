<script defer="True" src="../../assets/arcade-monetization.js"></script><script type="module" src="../../assets/kernel-chamber.js"></script><link rel="stylesheet" href="../../assets/shared-nav.css"><script src="../../assets/global-nav.js"></script></head>
<body class="selection:bg-cyan-500 selection:text-slate-900 antialiased" data-gear-id="games" data-kernel-event="library.game_opened">
<div id="game-sandbox-area">
</div>
<script>
        const canvas = document.createElement('canvas');
        canvas.width = 600; canvas.height = 600;
        canvas.className = 'w-full h-full block bg-slate-950 cursor-pointer max-w-lg mx-auto';
        document.getElementById('game-sandbox-area').appendChild(canvas);

        const ctx = canvas.getContext('2d');
        const grid = 24;
        let snake = [{x: 12, y: 12}, {x: 11, y: 12}];
        let food = {x: 5, y: 5};
        let dx = 1, dy = 0; let score = 0;
        canvas.style.touchAction='none';
        let sx=0, sy=0;
        canvas.addEventListener('pointerdown', (e)=>{ try { e.target.setPointerCapture(e.pointerId); } catch(err){} e.preventDefault(); sx=e.clientX; sy=e.clientY; });
        canvas.addEventListener('pointerup', (e)=>{ e.preventDefault(); let diffX=e.clientX-sx, diffY=e.clientY-sy; if(Math.hypot(diffX,diffY)<10) return; if(Math.abs(diffX)>Math.abs(diffY)) { if(diffX>0 && dx===0) {dx=1;dy=0;} else if(diffX<0 && dx===0) {dx=-1;dy=0;} } else { if(diffY>0 && dy===0) {dx=0;dy=1;} else if(diffY<0 && dy===0) {dx=0;dy=-1;} } });

        window.addEventListener('keydown', (e) => {
            if(e.key==='ArrowUp' && dy===0) { dx=0; dy=-1; }
            if(e.key==='ArrowDown' && dy===0) { dx=0; dy=1; }
            if(e.key==='ArrowLeft' && dx===0) { dx=-1; dy=0; }
            if(e.key==='ArrowRight' && dx===0) { dx=1; dy=0; }
        });

        function loop() {
            ctx.fillStyle = '#020617'; ctx.fillRect(0,0, canvas.width, canvas.height);

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            if(head.x === food.x && head.y === food.y) {
                score += 50; food = {x: Math.floor(Math.random()*(canvas.width/grid)), y: Math.floor(Math.random()*(canvas.height/grid))};
                if(score%250===0 && window.parent) window.parent.postMessage({ type: "ARCADE_TRIGGER_AD", adType: "rewarded" }, "*");
            } else {
                snake.pop();
            }

            // Draw Food
            ctx.fillStyle = '#facc15'; ctx.fillRect(food.x*grid, food.y*grid, grid-2, grid-2);

            // Draw Snake
            snake.forEach((s, i) => {
                ctx.fillStyle = i===0 ? '#22d3ee' : '#0ea5e9';
                ctx.fillRect(s.x*grid, s.y*grid, grid-2, grid-2);
            });

            ctx.fillStyle = '#34d399'; ctx.font = 'bold 16px monospace';
            ctx.fillText(`CYBER SNAKE XP: ${score}`, 15, 25);
        }
        // Extremely robust Phase 4 requestAnimationFrame loop with delta time (dt) physics correction
        let lastTimestamp = performance.now();
        let moveChronoBuffer = 0;
        function executionRafLoop(currTime) {
            requestAnimationFrame(executionRafLoop);
            const dt = currTime - lastTimestamp;
            lastTimestamp = currTime;
            moveChronoBuffer += dt;
            if (moveChronoBuffer >= 110) {
                moveChronoBuffer -= 110;
                loop();
            }
        }
        requestAnimationFrame(executionRafLoop);
    </script>
