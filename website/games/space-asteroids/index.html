<script defer="True" src="../../assets/arcade-monetization.js"></script><script type="module" src="../../assets/kernel-chamber.js?v=1.1.0"></script></head>
<body class="selection:bg-cyan-500 selection:text-slate-900 antialiased" data-gear-id="games" data-kernel-event="library.game_opened">
<div id="game-sandbox-area">
</div>
<script>
        const canvas = document.createElement('canvas');
        const logicalWidth = 800; const logicalHeight = 500;
        canvas.width = logicalWidth; canvas.height = logicalHeight;
        canvas.className = 'w-full block bg-slate-950 cursor-pointer';
        canvas.style.aspectRatio = '16 / 10';
        canvas.style.objectFit = 'cover';
        document.getElementById('game-sandbox-area').appendChild(canvas);

        const ctx = canvas.getContext('2d');
        // DevicePixelRatio Retina Scaling Correction
        const dpr = window.devicePixelRatio || 1;
        canvas.width = logicalWidth * dpr;
        canvas.height = logicalHeight * dpr;
        ctx.scale(dpr, dpr);
        let rocks = [], bullets = [];
        let ship = { x: logicalWidth/2, y: logicalHeight/2, vx: 0, vy: 0, a: 0 };
        let score = 0;
        const keys = { left: false, right: false, thrust: false };

        canvas.style.touchAction='none';
        const dpad = document.createElement('div');
        dpad.className = 'absolute bottom-4 left-4 right-4 flex justify-between select-none z-50 font-mono';
        dpad.innerHTML = `<div class='flex gap-1 sm:gap-2'><button id='btn-la' class='px-3 py-3 sm:px-5 sm:py-4 bg-slate-900/85 border-2 border-cyan-400 text-cyan-400 font-black rounded-xl text-xs sm:text-lg active:bg-cyan-400 active:text-black'>◀ ROT</button><button id='btn-ra' class='px-3 py-3 sm:px-5 sm:py-4 bg-slate-900/85 border-2 border-cyan-400 text-cyan-400 font-black rounded-xl text-xs sm:text-lg active:bg-cyan-400 active:text-black'>ROT ▶</button></div><div class='flex gap-1 sm:gap-2'><button id='btn-thrust' class='px-3 py-3 sm:px-5 sm:py-4 bg-slate-900/85 border-2 border-gold text-gold font-black rounded-xl text-xs sm:text-lg active:bg-gold active:text-black'>▲ THRUST</button><button id='btn-fire' class='px-4 py-3 sm:px-6 sm:py-4 bg-rose-500 hover:bg-rose-400 text-black font-black rounded-xl text-xs sm:text-lg shadow-lg active:scale-95'>🚀 FIRE</button></div>`;
        document.getElementById('game-sandbox-area').appendChild(dpad);
        
        const bindK = (id, k) => {
            const el = document.getElementById(id);
            if(!el) return;
            el.addEventListener('pointerdown', (e)=>{ try { e.target.setPointerCapture(e.pointerId); } catch(err){} e.preventDefault(); keys[k]=true; });
            const stop = (e)=>{ keys[k]=false; };
            el.addEventListener('pointerup', stop);
            el.addEventListener('pointercancel', stop);
        };
        bindK('btn-la', 'left');
        bindK('btn-ra', 'right');
        bindK('btn-thrust', 'thrust');

        document.getElementById('btn-fire').addEventListener('pointerdown', (e)=>{
            try { e.target.setPointerCapture(e.pointerId); } catch(err){}
            e.preventDefault();
            bullets.push({ x: ship.x, y: ship.y, vx: ship.vx + Math.cos(ship.a)*10, vy: ship.vy + Math.sin(ship.a)*10, lifespan: 60 });
        });

        function spawnRocks() {
            rocks = [];
            for(let i=0; i<6; i++) rocks.push({ x:Math.random()*logicalWidth, y:Math.random()*logicalHeight, vx:(Math.random()-0.5)*3, vy:(Math.random()-0.5)*3, r:30 });
        } spawnRocks();

        window.addEventListener('keydown', (e) => {
            if(e.key==='ArrowLeft'||e.key==='a') keys.left = true;
            if(e.key==='ArrowRight'||e.key==='d') keys.right = true;
            if(e.key==='ArrowUp'||e.key==='w') keys.thrust = true;
            if(e.key===' ') bullets.push({ x: ship.x, y: ship.y, vx: ship.vx + Math.cos(ship.a)*10, vy: ship.vy + Math.sin(ship.a)*10, lifespan: 60 });
        });
        window.addEventListener('keyup', (e) => {
            if(e.key==='ArrowLeft'||e.key==='a') keys.left = false;
            if(e.key==='ArrowRight'||e.key==='d') keys.right = false;
            if(e.key==='ArrowUp'||e.key==='w') keys.thrust = false;
        });

        function loop() {
            ctx.fillStyle = '#020617'; ctx.fillRect(0,0, logicalWidth, logicalHeight);

            if(keys.left) ship.a -= 0.08;
            if(keys.right) ship.a += 0.08;
            if(keys.thrust) {
                ship.vx += Math.cos(ship.a)*0.15;
                ship.vy += Math.sin(ship.a)*0.15;
            }
            ship.x += ship.vx; ship.y += ship.vy;
            ship.vx *= 0.99; ship.vy *= 0.99;
            if(ship.x < 0) ship.x = logicalWidth; if(ship.x > logicalWidth) ship.x = 0;
            if(ship.y < 0) ship.y = logicalHeight; if(ship.y > logicalHeight) ship.y = 0;

            bullets.forEach((b, bi) => {
                b.x += b.vx; b.y += b.vy; b.lifespan--;
                if(b.x < 0) b.x = logicalWidth; if(b.x > logicalWidth) b.x = 0;
                if(b.y < 0) b.y = logicalHeight; if(b.y > logicalHeight) b.y = 0;
                
                ctx.fillStyle='#34d399'; ctx.beginPath(); ctx.arc(b.x,b.y,3,0,Math.PI*2); ctx.fill();
                
                rocks.forEach((r, ri) => {
                    if(Math.hypot(b.x-r.x, b.y-r.y) <= r.r) {
                        rocks.splice(ri,1); b.lifespan = 0; score += 50;
                        if(r.r > 15) { rocks.push({x:r.x,y:r.y,vx:r.vx+2,vy:r.vy+2,r:14}); rocks.push({x:r.x,y:r.y,vx:r.vx-2,vy:r.vy-2,r:14}); }
                        if(rocks.length === 0) {
                            spawnRocks();
                            if(window.parent) window.parent.postMessage({ type: "ARCADE_TRIGGER_AD", adType: "interstitial" }, "*");
                        }
                    }
                });
            });
            bullets = bullets.filter(b => b.lifespan > 0);

            rocks.forEach(r => {
                r.x += r.vx; r.y += r.vy;
                if(r.x<0) r.x=logicalWidth; if(r.x>logicalWidth) r.x=0; if(r.y<0) r.y=logicalHeight; if(r.y>logicalHeight) r.y=0;
                
                if(Math.hypot(ship.x-r.x, ship.y-r.y) <= r.r) {
                    score = Math.max(0, score - 100); ship.x = logicalWidth/2; ship.y = logicalHeight/2; ship.vx = 0; ship.vy = 0;
                    if(window.parent) window.parent.postMessage({ type: "ARCADE_TRIGGER_AD", adType: "interstitial" }, "*");
                }

                ctx.strokeStyle='#facc15'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,Math.PI*2); ctx.stroke();
            });

            ctx.save(); ctx.translate(ship.x, ship.y); ctx.rotate(ship.a);
            ctx.fillStyle='#22d3ee'; ctx.beginPath(); ctx.moveTo(20,0); ctx.lineTo(-15,15); ctx.lineTo(-10,0); ctx.lineTo(-15,-15); ctx.fill();
            if(keys.thrust) {
                ctx.fillStyle='#facc15'; ctx.beginPath(); ctx.moveTo(-12,0); ctx.lineTo(-25,5); ctx.lineTo(-25,-5); ctx.fill();
            }
            ctx.restore();

            ctx.fillStyle='#22d3ee'; ctx.font='bold 16px monospace'; ctx.fillText(`DEMOLITION XP: ${score} // TARGETS: ${rocks.length}`, 20, 30);
            requestAnimationFrame(loop);
        } loop();
    </script>
