<script>
        class CosmicTunnelEngine {
            constructor() {
                this.canvas = document.getElementById('cosmic-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.score = 0;
                this.speed = 3.5;
                this.distanceTraveled = 0;

                // Cyber Execution Engine Loop States
                this.isGameOver = false;
                this.isAdRunning = false;
                this.animFrameId = null;

                // 3D Wormhole Geometry Configuration
                this.fov = 400; // Focal exact scale
                this.maxZ = 2000;
                this.ringCount = 38;
                this.segments = 16; // Poly cylinder vertices
                this.tunnelRadius = 300;

                // Tube Morph & Bending offsets
                this.bendPhase = 0;
                this.bendSpeed = 0.015;

                // Operational Entity Storage
                this.rings = [];
                this.obstacles = [];
                this.tachyons = [];
                this.particles = [];

                // Player Spaceship Matrix
                this.playerAngle = Math.PI / 2; // Bottom start
                this.targetPlayerAngle = Math.PI / 2;
                this.playerRadiusEl = 220; // Radius off center

                // Control States
                this.keys = { left: false, right: false };
                this.touchStartX = 0;
                this.lastTouchX = 0;

                this.initWebAudio();
                this.bindInputs();
                this.bindAdClearanceOrchestrator();
                this.rebootCosmicWormhole();
            }

            initWebAudio() {
                try {
                    this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) {
                    console.warn("Web Audio API disabled in current browser viewport context.");
                }
            }

            playSynthesizedTone(type) {
                if (!this.audioCtx || this.audioCtx.state === 'suspended') return;

                const osc = this.audioCtx.createOscillator();
                const gain = this.audioCtx.createGain();
                osc.connect(gain);
                gain.connect(this.audioCtx.destination);
                const now = this.audioCtx.currentTime;

                switch(type) {
                    case 'pickup':
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(587.33, now); // D5
                        osc.frequency.exponentialRampToValueAtTime(1174.66, now + 0.15); // D6
                        gain.gain.setValueAtTime(0.2, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                        osc.start(now); osc.stop(now + 0.2);
                        break;
                    
                    case 'crash':
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(130, now);
                        osc.frequency.exponentialRampToValueAtTime(40, now + 0.35);
                        gain.gain.setValueAtTime(0.4, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
                        osc.start(now); osc.stop(now + 0.35);
                        break;
                }
            }

            bindInputs() {
                // Resize calibration
                const resize = () => {
                    this.canvas.width = window.innerWidth;
                    this.canvas.height = window.innerHeight;
                };
                window.addEventListener('resize', resize);
                resize();

                // Keyboard listener
                window.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') this.keys.left = true;
                    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') this.keys.right = true;
                });
                window.addEventListener('keyup', (e) => {
                    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') this.keys.left = false;
                    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') this.keys.right = false;
                });

                // Flawless Unified Pointer Capture Steering Engine
                const touchZone = document.getElementById('touch-orchestrator');
                if (touchZone) {
                    touchZone.style.touchAction = 'none';
                    this.canvas.style.touchAction = 'none';
                    this.isPointerSteering = false;
                    this.touchSteerDir = 0;
                    
                    touchZone.addEventListener('pointerdown', (e) => {
                        try { e.target.setPointerCapture(e.pointerId); } catch(err){}
                        e.preventDefault();
                        if (e.target.id === 'touch-left') this.touchSteerDir = -1;
                        if (e.target.id === 'touch-right') this.touchSteerDir = 1;
                        this.lastTouchX = e.clientX;
                        this.isPointerSteering = true;
                    });
                    touchZone.addEventListener('pointermove', (e) => {
                        if (!this.isPointerSteering) return;
                        e.preventDefault();
                        const currentX = e.clientX;
                        const deltaX = currentX - this.lastTouchX;
                        if (Math.abs(deltaX) > 2) {
                            this.targetPlayerAngle += deltaX * 0.008;
                        }
                        this.lastTouchX = currentX;
                    });
                    const stopTouch = () => {
                        this.isPointerSteering = false;
                        this.touchSteerDir = 0;
                    };
                    touchZone.addEventListener('pointerup', stopTouch);
                    touchZone.addEventListener('pointercancel', stopTouch);
                }
            }

            // Strict Asynchronous Ad Loop Orchestrator
            bindAdClearanceOrchestrator() {
                window.addEventListener('message', (e) => {
                    if (e.data && e.data.type === "ARCADE_AD_COMPLETE") {
                        console.log("🚀 [AD CLEARANCE CONFIRMED] Asynchronous handshake received from Parent Hub. Cosmic Tunnel unlocked.");
                        const btn = document.getElementById('resume-clearance-btn');
                        if (btn) {
                            btn.textContent = "🚀 MOUNT NEW WORMHOLE >>";
                            btn.disabled = false;
                            btn.classList.add('animate-pulse');
                        }
                    }
                });

                document.getElementById('resume-clearance-btn').addEventListener('click', () => {
                    document.getElementById('ad-clearance-modal').classList.remove('active');
                    this.rebootCosmicWormhole();
                });
            }

            rebootCosmicWormhole() {
                this.score = 0;
                this.speed = 3.5;
                this.distanceTraveled = 0;
                this.isGameOver = false;
                this.isAdRunning = false;
                this.playerAngle = Math.PI / 2;
                this.targetPlayerAngle = Math.PI / 2;
                this.particles = [];

                this.updateStatsUI();
                if (this.audioCtx && this.audioCtx.state === 'suspended') this.audioCtx.resume();

                // Initialize structural 3D Rings
                this.rings = [];
                const ringStep = this.maxZ / this.ringCount;
                for (let i = 0; i < this.ringCount; i++) {
                    this.rings.push({ z: i * ringStep });
                }

                // Initialize dynamic obstacles and tachyons
                this.obstacles = [];
                this.tachyons = [];
                for (let i = 0; i < 8; i++) {
                    this.spawnEntity(1000 + i * 400);
                }

                this.animFrameId = requestAnimationFrame(() => this.executionPipelineLoop());
            }

            spawnEntity(zDist) {
                const angle = Math.floor(Math.random() * this.segments) * (Math.PI * 2 / this.segments);
                
                // 60% Threat Obstacle, 40% Golden Tachyon
                if (Math.random() < 0.6) {
                    this.obstacles.push({
                        z: zDist,
                        angle: angle,
                        sliceSpan: Math.PI * 2 / this.segments * (1 + Math.floor(Math.random() * 2)) // Spans 1 or 2 poly segments
                    });
                } else {
                    this.tachyons.push({
                        z: zDist,
                        angle: angle,
                        sliceSpan: Math.PI * 2 / this.segments
                    });
                }
            }

            executionPipelineLoop() {
                if (this.isGameOver) return;

                this.updateWormholePhysics();
                this.render3DWormholeTheater();

                this.animFrameId = requestAnimationFrame(() => this.executionPipelineLoop());
            }

            updateWormholePhysics() {
                // Handle continuous keyboard and touch panel rotation
                if (this.keys.left || this.touchSteerDir === -1) this.targetPlayerAngle -= 0.06;
                if (this.keys.right || this.touchSteerDir === 1) this.targetPlayerAngle += 0.06;

                // Smooth execution angle interpolation
                this.playerAngle += (this.targetPlayerAngle - this.playerAngle) * 0.2;

                // Keep angle clean
                this.playerAngle = (this.playerAngle + Math.PI * 2) % (Math.PI * 2);

                // Morph Wormhole Curve
                this.bendPhase += this.bendSpeed;
                this.distanceTraveled += this.speed;

                // Gradually scale speed
                this.speed = Math.min(8.5, 3.5 + (this.distanceTraveled / 6000));
                this.score = Math.floor(this.distanceTraveled / 10);
                this.updateStatsUI();

                // Update 3D structural Rings
                this.rings.forEach(r => {
                    r.z -= this.speed * 4;
                    if (r.z <= 0) r.z += this.maxZ;
                });
                this.rings.sort((a,b) => b.z - a.z);

                // Process on-coming dynamic Obstacles
                for (let i = this.obstacles.length - 1; i >= 0; i--) {
                    const ob = this.obstacles[i];
                    ob.z -= this.speed * 4;

                    // Check fatal player collision at Z cross plane
                    if (ob.z < 80 && ob.z > 20) {
                        // Check angle overlap
                        let diff = Math.abs(ob.angle - this.playerAngle);
                        diff = Math.min(diff, Math.PI * 2 - diff);

                        if (diff <= ob.sliceSpan / 2 + 0.18) {
                            this.executeVesselFatalCrash();
                            return;
                        }
                    }

                    if (ob.z <= 0) {
                        this.obstacles.splice(i, 1);
                        this.spawnEntity(this.maxZ);
                    }
                }

                // Process Tachyons
                for (let i = this.tachyons.length - 1; i >= 0; i--) {
                    const t = this.tachyons[i];
                    t.z -= this.speed * 4;

                    if (t.z < 100 && t.z > 20) {
                        let diff = Math.abs(t.angle - this.playerAngle);
                        diff = Math.min(diff, Math.PI * 2 - diff);

                        if (diff <= t.sliceSpan / 2 + 0.2) {
                            // Collected tachyon fragment!
                            this.playSynthesizedTone('pickup');
                            this.score += 150;
                            this.createExplosionParticles(t.angle, '#facc15');
                            this.tachyons.splice(i, 1);
                            this.spawnEntity(this.maxZ);
                            continue;
                        }
                    }

                    if (t.z <= 0) {
                        this.tachyons.splice(i, 1);
                        this.spawnEntity(this.maxZ);
                    }
                }

                // Process spatial explosion particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx; p.y += p.vy;
                    p.alpha -= 0.04;
                    if (p.alpha <= 0) this.particles.splice(i, 1);
                }
            }

            getWormholeBendOffset(z) {
                // Sinusoidal spatial curve matrix
                const f = z / this.maxZ;
                const bx = Math.sin(this.bendPhase + f * Math.PI * 2) * 350 * f;
                const by = Math.cos(this.bendPhase * 0.8 + f * Math.PI * 2) * 250 * f;
                return { x: bx, y: by };
            }

            render3DWormholeTheater() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                const cx = this.canvas.width / 2;
                const cy = this.canvas.height / 2;

                // Enforce immersive camera roll so the player craft remains anchored at the bottom
                const cameraRoll = -this.playerAngle + Math.PI / 2;

                // 1. Render 3D Tunnel Wireframe and Cyber Wall Polygons
                for (let i = 0; i < this.rings.length - 1; i++) {
                    const r1 = this.rings[i];
                    const r2 = this.rings[i+1];

                    const bend1 = this.getWormholeBendOffset(r1.z);
                    const bend2 = this.getWormholeBendOffset(r2.z);

                    const scale1 = this.fov / Math.max(1, r1.z);
                    const scale2 = this.fov / Math.max(1, r2.z);

                    // Compute ring circle nodes
                    const p1 = []; const p2 = [];
                    for (let s = 0; s < this.segments; s++) {
                        const ang = s * (Math.PI * 2 / this.segments) + cameraRoll;
                        p1.push({
                            x: cx + (bend1.x + Math.cos(ang) * this.tunnelRadius) * scale1,
                            y: cy + (bend1.y + Math.sin(ang) * this.tunnelRadius) * scale1
                        });
                        p2.push({
                            x: cx + (bend2.x + Math.cos(ang) * this.tunnelRadius) * scale2,
                            y: cy + (bend2.y + Math.sin(ang) * this.tunnelRadius) * scale2
                        });
                    }

                    // Draw depth gradient polygons
                    const f = 1 - (r1.z / this.maxZ);
                    const alpha = Math.max(0.05, f * 0.85);
                    
                    for (let s = 0; s < this.segments; s++) {
                        const nextS = (s + 1) % this.segments;
                        
                        this.ctx.fillStyle = s % 2 === 0 ? `rgba(9, 13, 22, ${alpha})` : `rgba(2, 6, 23, ${alpha})`;
                        this.ctx.beginPath();
                        this.ctx.moveTo(p1[s].x, p1[s].y);
                        this.ctx.lineTo(p1[nextS].x, p1[nextS].y);
                        this.ctx.lineTo(p2[nextS].x, p2[nextS].y);
                        this.ctx.lineTo(p2[s].x, p2[s].y);
                        this.ctx.closePath();
                        this.ctx.fill();

                        // Premium Glowing Blue Wireframe borders
                        this.ctx.strokeStyle = `rgba(34, 211, 238, ${alpha * 0.4})`;
                        this.ctx.lineWidth = 1.5;
                        this.ctx.stroke();
                    }
                }

                // 2. Render Oncoming Dynamic Threat Obstacles
                this.obstacles.forEach(ob => {
                    const bend = this.getWormholeBendOffset(ob.z);
                    const scale = this.fov / Math.max(1, ob.z);
                    const alpha = Math.max(0.1, 1 - (ob.z / this.maxZ));

                    const ang = ob.angle + cameraRoll;
                    const px1 = cx + (bend.x + Math.cos(ang - ob.sliceSpan/2) * this.tunnelRadius) * scale;
                    const py1 = cy + (bend.y + Math.sin(ang - ob.sliceSpan/2) * this.tunnelRadius) * scale;
                    const px2 = cx + (bend.x + Math.cos(ang + ob.sliceSpan/2) * this.tunnelRadius) * scale;
                    const py2 = cy + (bend.y + Math.sin(ang + ob.sliceSpan/2) * this.tunnelRadius) * scale;

                    // Draw crimson laser barrier
                    this.ctx.fillStyle = `rgba(244, 63, 94, ${alpha})`;
                    this.ctx.beginPath();
                    this.ctx.moveTo(cx + bend.x * scale, cy + bend.y * scale);
                    this.ctx.lineTo(px1, py1);
                    this.ctx.lineTo(px2, py2);
                    this.ctx.closePath();
                    this.ctx.fill();

                    // Implosion threat borders
                    this.ctx.strokeStyle = `rgba(255, 225, 230, ${alpha})`;
                    this.ctx.lineWidth = 3;
                    this.ctx.stroke();
                });

                // 3. Render Tachyon Fragments
                this.tachyons.forEach(t => {
                    const bend = this.getWormholeBendOffset(t.z);
                    const scale = this.fov / Math.max(1, t.z);
                    const alpha = Math.max(0.2, 1 - (t.z / this.maxZ));

                    const ang = t.angle + cameraRoll;
                    const px = cx + (bend.x + Math.cos(ang) * (this.tunnelRadius * 0.8)) * scale;
                    const py = cy + (bend.y + Math.sin(ang) * (this.tunnelRadius * 0.8)) * scale;

                    this.ctx.fillStyle = `rgba(250, 204, 21, ${alpha})`;
                    this.ctx.beginPath();
                    this.ctx.arc(px, py, 12 * scale, 0, Math.PI * 2);
                    this.ctx.fill();

                    this.ctx.strokeStyle = `rgba(254, 240, 138, ${alpha})`;
                    this.ctx.lineWidth = 2;
                    this.ctx.stroke();
                });

                // 4. Render Player Spaceship Craft
                // Anchored perfectly at the bottom of the tunnel view
                const pScreenX = cx;
                const pScreenY = cy + Math.min(cy * 0.55, 220);

                // Draw premium special ops cyber delta craft
                this.ctx.save();
                this.ctx.translate(pScreenX, pScreenY);
                this.ctx.rotate(Math.PI);

                // Delta Wings
                this.ctx.fillStyle = '#22d3ee';
                this.ctx.beginPath();
                this.ctx.moveTo(0, -25);
                this.ctx.lineTo(-20, 20);
                this.ctx.lineTo(0, 12);
                this.ctx.lineTo(20, 20);
                this.ctx.closePath();
                this.ctx.fill();

                // Energy Core Thruster
                this.ctx.fillStyle = '#facc15';
                this.ctx.beginPath();
                this.ctx.arc(0, 16, 6, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.restore();

                // 5. Render physical explosion particles
                this.particles.forEach(p => {
                    this.ctx.fillStyle = p.color;
                    this.ctx.globalAlpha = Math.max(0, p.alpha);
                    this.ctx.fillRect(cx + p.x, cy + p.y, p.size, p.size);
                });
                this.ctx.globalAlpha = 1.0;
            }
