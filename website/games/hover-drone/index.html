<script defer="True" src="../../assets/arcade-monetization.js"></script></head>
<body class="selection:bg-cyan-500 selection:text-slate-900 antialiased">
<div id="game-sandbox-area">
</div>
<script>
        const canvas = document.createElement('canvas');
        const logicalWidth = 800; const logicalHeight = 500;
        canvas.width = logicalWidth; canvas.height = logicalHeight;
        canvas.className = 'w-full block bg-black cursor-pointer';
        canvas.style.aspectRatio = '16 / 10';
        canvas.style.objectFit = 'cover';
        document.getElementById('game-sandbox-area').appendChild(canvas);

        const ctx = canvas.getContext('2d');
        // DevicePixelRatio Retina Scaling Correction
        const dpr = window.devicePixelRatio || 1;
        canvas.width = logicalWidth * dpr;
        canvas.height = logicalHeight * dpr;
        ctx.scale(dpr, dpr);
        let drone = { y: logicalHeight/2, vy: 0 };
        let pipes = [{ x: logicalWidth, top: 150, bot: 300 }];
        let score = 0;
        let lastAdScore = 0;
        function triggerArcadeAd(type='interstitial') {
            if (window.parent) window.parent.postMessage({ type: "ARCADE_TRIGGER_AD", adType: type }, "*");
        }
        function resetRun() {
            if (score >= 30 && score !== lastAdScore) { lastAdScore = score; triggerArcadeAd('interstitial'); }
            drone.y=logicalHeight/2; drone.vy=0; score=0; pipes=[{x:logicalWidth, top:150, bot:300}];
        }

        canvas.style.touchAction='none';
        canvas.addEventListener('pointerdown', (e) => {
            try { e.target.setPointerCapture(e.pointerId); } catch(err){} e.preventDefault(); drone.vy = -7; });

        function loop() {
            ctx.fillStyle = '#030712'; ctx.fillRect(0,0, logicalWidth, logicalHeight);

            drone.y += drone.vy; drone.vy += 0.4;
            if(drone.y > logicalHeight || drone.y < 0) {
                resetRun()
            }

            pipes.forEach((p, i) => {
                p.x -= 4;
                if(p.x === 400) { pipes.push({ x: logicalWidth, top: 100+Math.random()*150, bot: 300+Math.random()*100 }); score += 10; }
                if(p.x < -80) pipes.splice(i,1);

                ctx.fillStyle = '#f43f5e';
                ctx.fillRect(p.x, 0, 60, p.top);
                ctx.fillRect(p.x, p.bot, 60, logicalHeight - p.bot);

                if(drone.y<=p.top || drone.y>=p.bot) {
                    if(400>=p.x && 400<=p.x+60) {
                        resetRun()
                    }
                }
            });

            ctx.fillStyle = '#34d399'; ctx.beginPath(); ctx.arc(400, drone.y, 14, 0, Math.PI*2); ctx.fill();

            ctx.fillStyle = '#facc15'; ctx.font = 'bold 16px monospace'; ctx.fillText(`ALTITUDE XP: ${score} // TAP TO FLAP`, 20, 35);
            requestAnimationFrame(loop);
        } loop();
    </script>
</body>
