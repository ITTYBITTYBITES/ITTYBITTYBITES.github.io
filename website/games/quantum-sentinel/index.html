            const clientVer = localStorage.getItem('arcade_client_deployment_ver');

    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script>
        (function() {
            const v = localStorage.getItem('master_deployment_version');
            const target = 'v=202606182304';
            if (v !== target) {
                localStorage.setItem('master_deployment_version', target);
                if (window.caches) { caches.keys().then(n => n.forEach(c => caches.delete(c))); }
                window.location.reload(true);
            }

<body>

    <div class="sentinel-container font-mono">
        
        <!-- STATUS HUD -->
        <div class="status-hud">
            <div class="hud-group">
                <div class="stat-box">
                    <span class="stat-label">Tactical Score</span>
                    <span id="stat-score" class="stat-value score">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Core Shields</span>
                    <span id="stat-shields" class="stat-value shields">100%</span>
                </div>
            </div>
            <div class="hud-group">
                <div class="stat-box">
                    <span class="stat-label">Quantum Wave</span>
                    <span id="stat-wave" class="stat-value wave">1</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Sponsorship Bridge</span>
                    <span class="text-xs font-bold text-emerald-400 uppercase tracking-widest mt-1">Phase 2 Verified</span>
                </div>
            </div>
        </div>

        <!-- MAIN LEVEL THEATER -->
        <div class="theater-split">
            
            <!-- Highly Optimized 60FPS Play Canvas -->
            <div id="quantum-canvas-wrapper" class="canvas-wrapper">
                <!-- Dynamically initialized via game.js -->
            </div>

            <!-- TACTICAL LOG SIDEBAR -->
            <div class="tactical-sidebar">
                <div class="sidebar-header">◈ Quantum Ingestion Log</div>
                <div id="tactical-log-box" class="log-scroller custom-scrollbar">
                    <!-- Dynamic appended events -->
                </div>
                <div class="mt-4 pt-4 border-t border-slate-800 text-[10px] text-slate-500 tracking-wider">
                    Click reticles exactly. Clear 20 nodes to initiate Phase 2 waterfall handshake.
                </div>
            </div>

        </div>

    </div>

    <!-- WebAssembly / JS Game Logic Wrapper -->
    <script src="game.js"></script>
</body>
</html>
