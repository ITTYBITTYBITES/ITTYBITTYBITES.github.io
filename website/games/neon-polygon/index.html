<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Neon Geometric Defender — Elite Commercial Web Asset</title>
    <meta name="description" content="An aggressive first-person 3D WebGL tactical shooter. Defend your command hub from incoming geometric polygonal threats across a highly responsive 360-degree theater.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6P6NPFW4FZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6P6NPFW4FZ');
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Orbitron:wght@700;900&display=swap');
        body, html { overscroll-behavior: none; touch-action: none; -webkit-touch-callout: none; }
        body { font-family: 'JetBrains+Mono', monospace; background-color: #090d16; color: #f8fafc; margin: 0; padding: 16px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; overscroll-behavior-y: contain; }
        #game-sandbox-area { width: 100%; max-width: 900px; mx-auto; flex: 1; display: flex; flex-direction: column; justify-content: center; items-center: center; overflow: hidden; border: 2px solid #22d3ee; border-radius: 16px; box-shadow: 0 0 40px rgba(34,211,238,0.15); }
    </style>
    <!-- Universal Automated Cache-Busting & Auto-Refresh Guard -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script>
        (function() {
            const clientVer = localStorage.getItem('arcade_client_deployment_ver');
            const liveVer = 'v=1781821243';
            if (clientVer !== liveVer) {
                localStorage.setItem('arcade_client_deployment_ver', liveVer);
                if (window.caches) { caches.keys().then(n => n.forEach(c => caches.delete(c))); }
                if (clientVer) { window.location.reload(true); }
            }
        })();
    </script>
    <!-- Absolute Browser Cache Invalidation Guard -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script>
        (function() {
            const v = localStorage.getItem('master_deployment_version');
            const target = 'v=202606182304';
            if (v !== target) {
                localStorage.setItem('master_deployment_version', target);
                if (window.caches) { caches.keys().then(n => n.forEach(c => caches.delete(c))); }
                window.location.reload(true);
            }
        })();
    </script>
</head>
<body class="selection:bg-cyan-500 selection:text-slate-900 antialiased">
    
    <div id="game-sandbox-area">
    </div>

    <script>
        const canvas = document.createElement('canvas');
        const logicalWidth = 800; const logicalHeight = 500;
        canvas.width = logicalWidth; canvas.height = logicalHeight;
        canvas.className = 'w-full block bg-black cursor-crosshair';
        canvas.style.aspectRatio = '16 / 10';
        canvas.style.objectFit = 'cover';
        document.getElementById('game-sandbox-area').appendChild(canvas);

        const ctx = canvas.getContext('2d');
        // DevicePixelRatio Retina Scaling Correction
        const dpr = window.devicePixelRatio || 1;
        canvas.width = logicalWidth * dpr;
        canvas.height = logicalHeight * dpr;
        ctx.scale(dpr, dpr);
        let enemies = [], score = 0, pa = 0;

        for(let i=0; i<8; i++) enemies.push({ a: Math.random()*Math.PI*2, dist: 250+Math.random()*150, id:`E_${i}` });

        canvas.style.touchAction='none';
        canvas.addEventListener('pointerdown', (e) => {
            try { e.target.setPointerCapture(e.pointerId); } catch(err){}
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            if(rect.width > 0) {
                const cx = logicalWidth/2, cy = logicalHeight/2;
                const mx = (e.clientX - rect.left)*(logicalWidth/rect.width);
                const my = (e.clientY - rect.top)*(logicalHeight/rect.height);
                const clickAng = Math.atan2(my - cy, mx - cx);

                for(let i=enemies.length-1; i>=0; i--) {
                    let diff = Math.abs(enemies[i].a - clickAng); diff = Math.min(diff, Math.PI*2 - diff);
                    if(diff < 0.25) {
                        enemies.splice(i,1); score += 50;
                        enemies.push({ a: Math.random()*Math.PI*2, dist: 350+Math.random()*150, id:`E_${Date.now()%100}` });
                        if(score%400===0 && window.parent) window.parent.postMessage({ type: "ARCADE_TRIGGER_AD", adType: "rewarded" }, "*");
                        break;
                    }
                }
            }
        });

        function loop() {
            ctx.fillStyle = 'rgba(2,6,23,0.3)'; ctx.fillRect(0,0, logicalWidth, logicalHeight);
            const cx = logicalWidth/2, cy = logicalHeight/2;

            // Draw Core
            ctx.fillStyle = '#34d399'; ctx.beginPath(); ctx.arc(cx, cy, 30, 0, Math.PI*2); ctx.fill();

            // Run enemies
            enemies.forEach(e => {
                e.dist -= 1.2;
                if(e.dist <= 35) {
                    score = Math.max(0, score - 100); e.dist = 350;
                    if(window.parent) window.parent.postMessage({ type: "ARCADE_TRIGGER_AD", adType: "interstitial" }, "*");
                }
                const px = cx + Math.cos(e.a)*e.dist;
                const py = cy + Math.sin(e.a)*e.dist;

                ctx.fillStyle = '#f43f5e'; ctx.beginPath(); ctx.arc(px, py, 15, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#fecdd3'; ctx.lineWidth = 2; ctx.stroke();
            });

            // HUD
            ctx.fillStyle = '#facc15'; ctx.font = 'bold 16px monospace';
            ctx.fillText(`360 POLAR XP: ${score}`, 20, 30);
            ctx.fillText(`◈ CLICK APPROACHING GEOMETRIC THREATS TO ELIMINATE ◈`, 20, logicalHeight - 20);

            requestAnimationFrame(loop);
        }
        loop();
    </script>

</body>
</html>
