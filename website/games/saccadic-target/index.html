<body class="selection:bg-cyan-500 selection:text-slate-900 antialiased">
<div class="w-full max-w-4xl mx-auto flex-1 flex flex-col justify-center" id="game-sandbox-area">
</div>
<script>
        
        const container = document.getElementById('game-sandbox-area');
        const canvas = document.createElement('canvas');
        canvas.width = 600; canvas.height = 400;
        canvas.className = "border-2 border-slate-800 rounded-2xl bg-slate-950 w-full max-w-2xl mx-auto cursor-crosshair shadow-2xl block";
        container.appendChild(canvas);

        const scoreEl = document.createElement('div');
        scoreEl.className = "mt-6 text-center font-mono font-bold text-sm tracking-widest text-cyan-400 uppercase";
        scoreEl.textContent = "ACQUISITION XP: 0";
        container.appendChild(scoreEl);

        const ctx = canvas.getContext('2d');
        let tx = 0; let ty = 0; let radius = 14;
        let spawnedAt = Date.now();
        let xp = 0;

        function relocate() {
            tx = radius + Math.random() * (canvas.width - radius*2);
            ty = radius + Math.random() * (canvas.height - radius*2);
            spawnedAt = Date.now();
        }

        function draw() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            const elapsed = Date.now() - spawnedAt;

            if (elapsed > 1200) relocate();

            // Tactical reticle grid
            ctx.strokeStyle = "#0f172a"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2); ctx.stroke();

            // Target Node
            ctx.fillStyle = "#22d3ee";
            ctx.beginPath(); ctx.arc(tx, ty, radius, 0, Math.PI*2); ctx.fill();

            // Imploding verification ring
            ctx.strokeStyle = "rgba(34,211,238,0.5)"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(tx, ty, Math.max(radius, radius + 30 - (elapsed / 30)), 0, Math.PI*2); ctx.stroke();

            requestAnimationFrame(draw);
        }

        canvas.style.touchAction='none';
        canvas.addEventListener('pointerdown', (e) => {
            try { e.target.setPointerCapture(e.pointerId); } catch(err){}
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mx = (e.clientX - rect.left) * scaleX;
            const my = (e.clientY - rect.top) * scaleY;

            if (Math.hypot(mx - tx, my - ty) <= radius + 18) {
                xp += 45; relocate();
                if(window.parent && xp % 450 === 0) window.parent.postMessage({ type: "ARCADE_TRIGGER_AD", adType: "interstitial" }, "*");
            } else {
                xp = Math.max(0, xp - 20);
            }
            scoreEl.textContent = `ACQUISITION XP: ${xp}`;
        });

        relocate(); draw();
        
    </script>
